version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8100:8000"
    volumes:
      - ./backend_data:/app/data
    restart: always
    environment:
      # IMPORTANT: Change these before production use!
      # Generate SECRET_KEY: python -c "import secrets; print(secrets.token_hex(32))"
      - SECRET_KEY=${SECRET_KEY:-please-change-this-secret-key-in-production}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3200}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/status" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - monitor_net

  frontend:
    build: ./frontend
    ports:
      - "3200:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - monitor_net

networks:
  monitor_net:
    driver: bridge
